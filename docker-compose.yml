services:
  postgres:
    image: postgres:16-alpine
    container_name: ppc-dashboard-postgres
    environment:
      POSTGRES_USER: ppc_user
      POSTGRES_PASSWORD: ppc_password
      POSTGRES_DB: ppc_dashboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ppc_user -d ppc_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: